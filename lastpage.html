<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You 🌻</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/flower.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌻</text></svg>">
</head>

<body>
  <div class="sparkles">
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
  </div>

  <div class="page-content last-page-content">
    <div class="final-message">
      <p class="page-subtitle">"My love mine all mine, nothing in the world belongs to me…"</p>
      <h1 class="page-title final-title">Thank you for being mine</h1>
      <p class="final-text">
        You're the most beautiful person I've ever seen — <br />
        inside and out. 🖤
      </p>
      <p class="final-text-small">
        Here's to silent walks in the park, <br />
        to looking up at you (in every sense), <br />
        and to every moment with you.
      </p>
    </div>

    <!-- Sunflower animation -->
    <div class="sunflower-scene">
      <div class="sunflower-container">
        <!-- Sunflower 1 (main) -->
        <div class="sunflower sunflower-1">
          <div class="sunflower-head">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="petal p6"></div>
            <div class="petal p7"></div>
            <div class="petal p8"></div>
            <div class="petal p9"></div>
            <div class="petal p10"></div>
            <div class="petal p11"></div>
            <div class="petal p12"></div>
            <div class="seed-head"></div>
          </div>
          <div class="stem">
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
          </div>
        </div>
        <!-- Sunflower 2 (smaller, tilted) -->
        <div class="sunflower sunflower-2">
          <div class="sunflower-head">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="petal p6"></div>
            <div class="petal p7"></div>
            <div class="petal p8"></div>
            <div class="petal p9"></div>
            <div class="petal p10"></div>
            <div class="petal p11"></div>
            <div class="petal p12"></div>
            <div class="seed-head"></div>
          </div>
          <div class="stem">
            <div class="leaf leaf-right"></div>
          </div>
        </div>
        <!-- Sunflower 3 (smallest, other side) -->
        <div class="sunflower sunflower-3">
          <div class="sunflower-head">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="petal p6"></div>
            <div class="petal p7"></div>
            <div class="petal p8"></div>
            <div class="petal p9"></div>
            <div class="petal p10"></div>
            <div class="petal p11"></div>
            <div class="petal p12"></div>
            <div class="seed-head"></div>
          </div>
          <div class="stem">
            <div class="leaf leaf-left"></div>
          </div>
        </div>
      </div>
      <!-- Vase -->
      <div class="vase"></div>
    </div>

    <p class="final-footer">Happy Valentine's Day 🌻🖤</p>
  </div>

  <button class="music-toggle" id="musicToggle" title="Toggle music">♪</button>
  <audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <script src="js/music.js"></script>
</body>

</html>
