<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activities 🖤</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/activities.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖤</text></svg>">
</head>

<body>
  <div class="sparkles">
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
  </div>

  <div class="page-content">
    <p class="page-subtitle">"And so when it's over, take it with you to the moon…"</p>
    <h1 class="page-title">What shall we do?</h1>
    <p class="selection-hint">A silent walk in the park? Or something else? 🖤</p>

    <div class="selection-grid">
      <div class="selection-item">
        <img src="activities/aquarium.jpeg" alt="Aquarium" />
        <label><input type="checkbox" name="activities" value="aquarium" /> aquarium</label>
      </div>
      <div class="selection-item">
        <img src="activities/arcade.jpeg" alt="Arcade" />
        <label><input type="checkbox" name="activities" value="arcade" /> arcade</label>
      </div>
      <div class="selection-item">
        <img src="activities/cinema.jpeg" alt="Cinema" />
        <label><input type="checkbox" name="activities" value="cinema" /> cinema</label>
      </div>
      <div class="selection-item">
        <img src="activities/keramika.jpeg" alt="Ceramics" />
        <label><input type="checkbox" name="activities" value="ceramics" /> ceramics</label>
      </div>
      <div class="selection-item">
        <img src="activities/kunsthalle.jpeg" alt="Exhibition" />
        <label><input type="checkbox" name="activities" value="exhibition" /> exhibition</label>
      </div>
      <div class="selection-item">
        <img src="activities/park.jpeg" alt="Walk in the park" />
        <label><input type="checkbox" name="activities" value="park" /> walk in the park</label>
      </div>
    </div>

    <button class="btn btn-yes" onclick="location.href='lastpage.html'">
      <span>One Last Thing ♥</span>
    </button>
  </div>

  <button class="music-toggle" id="musicToggle" title="Toggle music">♪</button>
  <audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <script>
    document.querySelectorAll('.selection-item').forEach(item => {
      item.addEventListener('click', function (e) {
        if (e.target.tagName !== 'INPUT') {
          const cb = this.querySelector('input[type="checkbox"]');
          cb.checked = !cb.checked;
        }
      });
    });
  </script>
  <script src="js/music.js"></script>
</body>

</html>
