<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick a Date 🖤</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/date.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖤</text></svg>">
</head>

<body>
  <div class="sparkles">
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
  </div>

  <div class="page-content">
    <div class="glass-card date-card">
      <p class="page-subtitle">"But my love, mine all mine, I mine…"</p>
      <h1 class="page-title">When are you free?</h1>
      <p class="date-description">Pick a day for our little adventure ✨</p>

      <form class="date-form" action="food.html">
        <div class="date-input-wrapper">
          <label class="date-label" for="dateInput">Choose a date</label>
          <input type="date" id="dateInput" required />
        </div>
        <button class="btn btn-yes" type="submit">
          <span>Continue ♥</span>
        </button>
      </form>
    </div>
  </div>

  <button class="music-toggle" id="musicToggle" title="Toggle music">♪</button>
  <audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <script src="js/music.js"></script>
</body>

</html>
