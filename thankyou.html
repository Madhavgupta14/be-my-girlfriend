<body>

  <div class="page-content">

      <!-- Elegant heart-drawing canvas animation -->
      <div class="heart-canvas-wrapper">

      <p class="height-joke">

  <button class="music-toggle" id="musicToggle" title="Toggle music">♪</button>
  <audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <script>
    // === Elegant heart-drawing animation (turtle-style) ===
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    // High-DPI support
    canvas.width = 300 * dpr;
    canvas.height = 280 * dpr;
    canvas.style.width = '300px';
    canvas.style.height = '280px';
    ctx.scale(dpr, dpr);

    // Heart parametric equation
    function heartX(t) {
      return 16 * Math.pow(Math.sin(t), 3);
    }
    function heartY(t) {
      return -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
    }

    const centerX = 150;
    const centerY = 132;
    const scale = 7.5;
    const totalPoints = 200;
    let currentPoint = 0;
    let phase = 'drawing'; // 'drawing', 'glowing', 'fading'
    let glowTimer = 0;
    let fadeAlpha = 1;

    function drawFrame() {
      if (phase === 'drawing') {
        // Draw the next segment of the heart
        if (currentPoint === 0) {
          ctx.clearRect(0, 0, 300, 280);
        }

        const segmentsPerFrame = 2;
        for (let s = 0; s < segmentsPerFrame && currentPoint < totalPoints; s++) {
          const t1 = (currentPoint / totalPoints) * 2 * Math.PI;
          const t2 = ((currentPoint + 1) / totalPoints) * 2 * Math.PI;

          const x1 = centerX + heartX(t1) * scale;
          const y1 = centerY + heartY(t1) * scale;
          const x2 = centerX + heartX(t2) * scale;
          const y2 = centerY + heartY(t2) * scale;

          // Progress-based color: gold fading to champagne
          const progress = currentPoint / totalPoints;
          const r = Math.round(212 + (245 - 212) * progress);
          const g = Math.round(175 + (230 - 175) * progress);
          const b = Math.round(55 + (208 - 55) * progress);

          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.9)`;
          ctx.lineWidth = 1.8;
          ctx.lineCap = 'round';
          ctx.stroke();

          // Subtle glow trail
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.15)`;
          ctx.lineWidth = 6;
          ctx.stroke();

          currentPoint++;
        }

        if (currentPoint >= totalPoints) {
          phase = 'glowing';
          glowTimer = 0;
        }
      } else if (phase === 'glowing') {
        // Hold the completed heart with a subtle pulse
        glowTimer++;
        if (glowTimer > 120) { // ~2 seconds at 60fps
          phase = 'fading';
          fadeAlpha = 1;
        }
      } else if (phase === 'fading') {
        fadeAlpha -= 0.015;
        ctx.clearRect(0, 0, 300, 280);

        // Redraw the full heart with fading alpha
        for (let i = 0; i < totalPoints; i++) {
          const t1 = (i / totalPoints) * 2 * Math.PI;
          const t2 = ((i + 1) / totalPoints) * 2 * Math.PI;
          const x1 = centerX + heartX(t1) * scale;
          const y1 = centerY + heartY(t1) * scale;
          const x2 = centerX + heartX(t2) * scale;
          const y2 = centerY + heartY(t2) * scale;

          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.strokeStyle = `rgba(212, 175, 55, ${fadeAlpha * 0.9})`;
          ctx.lineWidth = 1.8;
          ctx.lineCap = 'round';
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.strokeStyle = `rgba(212, 175, 55, ${fadeAlpha * 0.15})`;
          ctx.lineWidth = 6;
          ctx.stroke();
        }

        if (fadeAlpha <= 0) {
          phase = 'drawing';
          currentPoint = 0;
          ctx.clearRect(0, 0, 300, 280);
        }
      }

      requestAnimationFrame(drawFrame);
    }

    drawFrame();
  </script>
  <script src="js/music.js"></script>

</body>

</html>
